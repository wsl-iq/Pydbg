name: Code Quality

on:

  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  lint:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Lint Tools
        run: |
          pip install flake8
          pip install black
          pip install isort

      - name: Check Formatting (Black)
        run: black --check .
        continue-on-error: true

      - name: Check Imports (isort)
        run: isort --check-only .
        continue-on-error: true

      - name: Run Flake8
        run: flake8 . --count --statistics --show-source --select=E9,F63,F7,F82
        continue-on-error: true